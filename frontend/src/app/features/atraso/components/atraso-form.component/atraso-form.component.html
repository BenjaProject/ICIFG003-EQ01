<form [formGroup]="form" (ngSubmit)="guardar()">
  <div class="row g-3">
    
    <div class="col-12" *ngIf="form.get('id')?.value === 0">
      <label class="form-label">Estudiante</label>
      <select formControlName="estudianteId" class="form-select" [class.is-invalid]="form.get('estudianteId')?.invalid && form.get('estudianteId')?.touched">
        <option [ngValue]="null" disabled>Seleccione un estudiante</option>
        @for (est of estStore.estudiantes(); track est.idEstudiante) {
          <option [ngValue]="est.idEstudiante">{{ est.nombre1 }} {{ est.apellido1 }} {{ est.apellido2 }}</option>
        }
      </select>
      <div class="invalid-feedback">El estudiante es obligatorio.</div>
    </div>
    
    <div class="col-md-6">
      <label class="form-label">Fecha</label>
      <input type="date" formControlName="fecha" class="form-control" [class.is-invalid]="form.get('fecha')?.invalid && form.get('fecha')?.touched">
    </div>

    <div class="col-md-6">
      <label class="form-label">Hora</label>
      <input type="time" formControlName="hora" class="form-control" [class.is-invalid]="form.get('hora')?.invalid && form.get('hora')?.touched">
    </div>

    <div class="col-12">
      <label class="form-label">Razón</label>
      <textarea formControlName="razon" class="form-control" rows="3" [class.is-invalid]="form.get('razon')?.invalid && form.get('razon')?.touched"></textarea>
    </div>

  </div>

  <div class="d-grid mt-4">
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
      {{ form.get('id')?.value === 0 ? 'Registrar Atraso' : 'Actualizar Atraso' }}
    </button>
    <button type="button" class="btn btn-link mt-2" (click)="cancelar()" *ngIf="form.get('id')?.value !== 0">
      Cancelar Edición
    </button>
  </div>
</form>
