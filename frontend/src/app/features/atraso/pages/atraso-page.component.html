<header>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
        <span class="material-symbols-outlined text-yellow" data-icon="school">school</span>
        <span class="text-uppercase fw-semibold" style="letter-spacing: 0.1em;">Proyecto Aplicaciones Web</span>
      </a>
      <button class="navbar-toggler" data-bs-target="#navbarAtrasos" data-bs-toggle="collapse" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarAtrasos">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/">Menú Principal</a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/estudiantes"
              [queryParams]="cursoId() ? { cursoId: cursoId() } : null"
            >
              Estudiantes
            </a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          @if (usuarioStore.isValid()) {
          <span class="text-white fw-semibold">Hola, {{ usuarioStore.username() || 'Usuario' }}</span>
          <button type="button" class="btn btn-outline-light btn-sm" (click)="logout()">Cerrar sesion</button>
          } @else {
          <a routerLink="/login" class="btn btn-yellow px-4 py-2">Login</a>
          }
        </div>
      </div>
    </div>
  </nav>
</header>

<main class="py-5 bg-light">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="fw-bold text-navy mb-2">Gestion de Atrasos</h1>
        <p class="text-muted mb-0">Administra registros y consulta atrasos de estudiantes.</p>
      </div>
    </div>

    <div class="row g-4 align-items-start">
      <div class="col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5 class="text-navy mb-3">Registrar Atraso</h5>
            <app-atraso-form></app-atraso-form>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5 class="text-navy mb-3">Listado</h5>
            <app-atraso-list></app-atraso-list>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
