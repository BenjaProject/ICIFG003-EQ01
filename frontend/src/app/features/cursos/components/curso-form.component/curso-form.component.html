<form [formGroup]="form" (ngSubmit)="guardar()" class="p-4 card shadow-sm">
  <div class="mb-3">
    <label class="form-label">Nombre del Curso</label>
    <input type="text" formControlName="nombreCurso" class="form-control">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary flex-fill" [disabled]="form.invalid">
      Guardar Curso
    </button>
    <button type="button" class="btn btn-outline-secondary flex-fill" (click)="cancelar()">
      Cancelar
    </button>
  </div>
</form>
