<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-primary">
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Nombre</th>
        <th scope="col" class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @if (store.error()) {
      <tr>
        <td class="text-danger fw-semibold" colspan="3">{{ store.error() }}</td>
      </tr>
      }
      @if (!store.loading() && store.cursos().length === 0) {
      <tr>
        <td class="text-muted" colspan="3">No hay cursos registrados.</td>
      </tr>
      }
      @for (curso of store.cursos(); track curso.idCurso) {
      <tr>
        <td>#{{ curso.idCurso }}</td>
        <td>{{ curso.nombreCurso }}</td>
        <td class="text-end">
          <div class="btn-group" role="group">
            <button class="btn btn-outline-secondary btn-sm" title="Ver estudiantes"
              (click)="verEstudiantes(curso.idCurso)">
              <span class="material-symbols-outlined" data-icon="group">group</span>
            </button>
            <button class="btn btn-outline-primary btn-sm" title="Editar" (click)="editarCurso(curso)">
              <span class="material-symbols-outlined" data-icon="edit">edit</span>
            </button>
            <button class="btn btn-outline-danger btn-sm" title="Eliminar" (click)="deleteCurso(curso.idCurso)">
              <span class="material-symbols-outlined" data-icon="delete">delete</span>
            </button>
          </div>
        </td>
      </tr>
      }
      @if (store.loading()) {
      <tr>
        <td colspan="3">Cargando cursos...</td>
      </tr>
      }
    </tbody>
  </table>
</div>
