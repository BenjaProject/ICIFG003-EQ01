<div class="bg-white rounded-lg shadow-sm border border-outline-variant overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead class="bg-primary-container text-white">
        <tr>
          <th class="px-6 py-4 font-label-caps text-label-caps">ID</th>
          <th class="px-6 py-4 font-label-caps text-label-caps">Nombre</th>
          <th class="px-6 py-4 font-label-caps text-label-caps text-right">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-outline-variant">
        @if (store.error()) {
        <tr>
          <td class="px-6 py-4 text-error font-semibold" colspan="3">{{ store.error() }}</td>
        </tr>
        }
        @if (!store.loading() && store.cursos().length === 0) {
        <tr>
          <td class="px-6 py-6 text-on-surface-variant" colspan="3">No hay cursos registrados.</td>
        </tr>
        }
        @for (curso of store.cursos(); track curso.idCurso) {
        <tr class="hover:bg-surface-container-low transition-colors group">
          <td class="px-6 py-4 text-on-surface-variant font-medium">#{{ curso.idCurso }}</td>
          <td class="px-6 py-4 text-on-surface-variant">{{ curso.nombreCurso }}</td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <button class="p-2 text-slate-600 hover:bg-slate-100 rounded transition-colors"
                title="Ver estudiantes" (click)="verEstudiantes(curso.idCurso)">
                <span class="material-symbols-outlined" data-icon="group">group</span>
              </button>
              <button class="p-2 text-primary-container hover:bg-blue-50 rounded transition-colors" title="Editar"
                (click)="editarCurso(curso)">
                <span class="material-symbols-outlined" data-icon="edit">edit</span>
              </button>
              <button class="p-2 text-error hover:bg-red-50 rounded transition-colors" title="Eliminar"
                (click)="deleteCurso(curso.idCurso)">
                <span class="material-symbols-outlined" data-icon="delete">delete</span>
              </button>
            </div>
          </td>
        </tr>
        }
        @if (store.loading()) {
        <tr class="opacity-40 select-none pointer-events-none">
          <td class="px-6 py-4">
            <div class="h-4 w-16 skeleton rounded"></div>
          </td>
          <td class="px-6 py-4">
            <div class="h-4 w-40 skeleton rounded"></div>
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <div class="w-8 h-8 skeleton rounded"></div>
              <div class="w-8 h-8 skeleton rounded"></div>
            </div>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
